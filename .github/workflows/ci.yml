name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Security: Minimal permissions
permissions:
  contents: read

jobs:
  lint-python:
    name: Python Syntax & Import Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install alerting dependencies
        run: pip install --no-cache-dir -r alerting/requirements.txt

      - name: Install webui dependencies
        run: pip install --no-cache-dir -r webui/requirements.txt

      - name: Syntax check — alerting
        run: python -m py_compile alerting/monitor.py

      - name: Syntax check — webui
        run: python -m py_compile webui/app.py

      - name: Install ruff
        run: pip install --no-cache-dir ruff

      - name: Lint — alerting
        run: ruff check alerting/monitor.py

      - name: Lint — webui
        run: ruff check webui/app.py

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14']

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install alerting dependencies
        run: pip install --no-cache-dir -r alerting/requirements.txt

      - name: Install webui dependencies
        run: pip install --no-cache-dir -r webui/requirements.txt

      - name: Install test dependencies
        run: pip install --no-cache-dir -r tests/requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  build-docker:
    name: Docker Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build alerting image
        run: docker build -f docker/alerting/Dockerfile -t pbs-alerting-test .

      - name: Build webui image
        run: docker build -f docker/webui/Dockerfile -t pbs-webui-test .

  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: build-docker
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Build alerting image for scan
        run: docker build -f docker/alerting/Dockerfile -t pbs-alerting-test .

      - name: Build webui image for scan
        run: docker build -f docker/webui/Dockerfile -t pbs-webui-test .

      - name: Scan alerting image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: pbs-alerting-test
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Scan webui image
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: pbs-webui-test
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  smoke-test:
    name: Docker Smoke Tests
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - uses: actions/checkout@v6

      - name: Build webui image
        run: docker build -f docker/webui/Dockerfile -t pbs-webui-test .

      - name: Prepare bind-mount data directory
        run: mkdir -p /tmp/smoke-data

      - name: Start webui container
        run: |
          docker run -d \
            --name pbs-webui-smoke \
            -p 5111:5111 \
            -e API_KEY=smoke-test-key \
            -e WEBUI_PASSWORD=smoketestpw \
            -e WEBUI_SECRET_KEY=smoketestsecretkey1234567890abcdef12 \
            -e ALERTING_DATA_DIR=/app/data \
            -v /tmp/smoke-data:/app/data:rw \
            pbs-webui-test

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:5111/login | grep -q "200"; then
              echo "Server ready after ${i}s"
              break
            fi
            sleep 1
            if [ "$i" = "30" ]; then
              echo "Server did not become ready within 30s"
              docker logs pbs-webui-smoke
              exit 1
            fi
          done

      - name: Smoke – /login is publicly reachable (200)
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5111/login)
          [ "$status" = "200" ] || { echo "Expected 200, got $status"; exit 1; }

      - name: Smoke – / redirects to /login when auth is enabled (302)
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5111/)
          [ "$status" = "302" ] || { echo "Expected 302, got $status"; exit 1; }

      - name: Smoke – unauthenticated API request returns 401
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5111/api/webui/info)
          [ "$status" = "401" ] || { echo "Expected 401, got $status"; exit 1; }

      - name: Smoke – unauthenticated write route returns 401
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" -d '{}' \
            http://localhost:5111/api/alerting/config)
          [ "$status" = "401" ] || { echo "Expected 401, got $status"; exit 1; }

      - name: Smoke – process runs as non-root
        run: |
          uid=$(docker exec pbs-webui-smoke sh -c 'awk "/^Uid:/{print \$2}" /proc/1/status')
          [ "$uid" != "0" ] || { echo "Container process is running as root"; exit 1; }

      - name: Smoke – app source files are read-only for runtime user
        run: |
          result=$(docker exec pbs-webui-smoke sh -c \
            'test -w /app/webui/app.py && echo writable || echo readonly')
          [ "$result" = "readonly" ] || { echo "app.py is writable by the runtime user"; exit 1; }

      - name: Smoke – data directory mode is 750
        run: |
          perm=$(docker exec pbs-webui-smoke stat -c '%a' /app/data)
          [ "$perm" = "750" ] || { echo "Expected data dir mode 750, got $perm"; exit 1; }

      - name: Smoke – runtime process umask is 0027
        run: |
          umask_val=$(docker exec pbs-webui-smoke \
            sh -c 'grep "^Umask:" /proc/1/status | awk "{print $2}"')
          [ "$umask_val" = "0027" ] || { echo "Expected umask 0027, got $umask_val"; exit 1; }

      - name: Dump container logs on failure
        if: failure()
        run: docker logs pbs-webui-smoke

      - name: Stop and remove container
        if: always()
        run: docker rm -f pbs-webui-smoke || true
