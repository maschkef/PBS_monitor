# Dependabot configuration for PBS Monitor
# Automatically creates pull requests to update dependencies

version: 2
updates:
  # Python packages for the alerting service
  - package-ecosystem: "pip"
    directory: "/alerting"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "09:00"
    reviewers:
      - "maschkef"
    assignees:
      - "maschkef"
    commit-message:
      prefix: "deps(pip/alerting)"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"

  # Python packages for the web UI
  - package-ecosystem: "pip"
    directory: "/webui"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "09:00"
    reviewers:
      - "maschkef"
    assignees:
      - "maschkef"
    commit-message:
      prefix: "deps(pip/webui)"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"

  # Docker base image for alerting service
  - package-ecosystem: "docker"
    directory: "/docker/alerting"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "09:00"
    reviewers:
      - "maschkef"
    assignees:
      - "maschkef"
    commit-message:
      prefix: "deps(docker/alerting)"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"

  # Docker base image for web UI
  - package-ecosystem: "docker"
    directory: "/docker/webui"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "09:00"
    reviewers:
      - "maschkef"
    assignees:
      - "maschkef"
    commit-message:
      prefix: "deps(docker/webui)"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "docker"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "saturday"
      time: "09:00"
    reviewers:
      - "maschkef"
    assignees:
      - "maschkef"
    commit-message:
      prefix: "deps(actions)"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
